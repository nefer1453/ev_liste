<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Fresh Market v13</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        :root { --header-h: 75px; --search-h: 60px; --footer-h: 170px; }
        html, body { height: 100vh; height: -webkit-fill-available; margin: 0; padding: 0; overflow: hidden; background: #fdfdfd; font-family: sans-serif; }
        .app-grid { display: grid; grid-template-rows: var(--header-h) var(--search-h) 1fr var(--footer-h); height: 100vh; width: 100%; }
        .scroll-container { overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 15px; }
        [x-cloak] { display: none !important; }
        .active-btn { border-left: 10px solid #10b981 !important; background: #f0fdf4; }
        .management-btn { border-left: 10px solid #f97316 !important; background: #fff7ed; }
        header { padding-top: env(safe-area-inset-top); }
        footer { padding-bottom: env(safe-area-inset-bottom); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body x-data="app()" x-init="loadData(); initVisibleProducts()">
    <div class="app-grid">
        <header class="bg-white shadow-sm flex items-center justify-between px-6 z-50">
            <div class="flex flex-col text-left">
                <h1 class="text-xl font-bold italic text-emerald-950 leading-none">FRESH MARKET</h1>
                <span class="text-[9px] font-black text-slate-400 tracking-widest uppercase mt-1">Sabit Ekran Modu v13</span>
            </div>
            <div class="flex items-center gap-2">
                <button @click="showManager = !showManager; openGroup = null" 
                        class="bg-orange-50 text-orange-600 p-3 rounded-2xl text-[10px] font-black uppercase border border-orange-100 flex items-center gap-1.5 active:scale-95 transition-all">
                    <span x-text="showManager ? '🛒 LİSTE' : '⚙️ YÖNET'"></span>
                </button>
                <button @click="clearAll()" class="bg-red-50 text-red-500 p-3 rounded-2xl text-[10px] font-black uppercase border border-red-100 active:scale-95 transition-all">Sıfırla</button>
            </div>
        </header>

        <div class="bg-slate-50 border-t border-slate-100 flex items-center px-4 z-40">
            <div class="relative w-full">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300">🔍</span>
                <input type="search" x-model="searchTerm" placeholder="Ürün veya reyon ara..." 
                       class="w-full h-12 pl-12 pr-4 bg-white rounded-xl border border-slate-200 text-sm focus:border-emerald-400 outline-none">
            </div>
        </div>

        <main class="scroll-container">
            <div class="max-w-md mx-auto space-y-4">
                <template x-if="showManager">
                    <div class="space-y-4">
                        <template x-for="(main, mIdx) in menu" :key="mIdx">
                            <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden">
                                <button @click="openGroup === mIdx ? openGroup = null : openGroup = mIdx" 
                                        class="w-full p-6 flex justify-between items-center" :class="openGroup === mIdx ? 'management-btn' : ''">
                                    <div class="flex items-center gap-4 text-left">
                                        <span class="text-4xl" x-text="main.icon"></span>
                                        <span class="font-black text-orange-950 uppercase text-[12px]" x-text="main.title"></span>
                                    </div>
                                </button>
                                <div x-show="openGroup === mIdx" x-cloak class="p-4 bg-orange-50/50 border-t border-orange-100 space-y-6">
                                    <template x-for="sub in main.subs">
                                        <div>
                                            <h3 class="text-[10px] font-black text-orange-700 mb-4 uppercase border-b-2 border-orange-200 pb-1" x-text="sub.name"></h3>
                                            <div class="grid grid-cols-1 gap-1.5">
                                                <template x-for="item in sub.items">
                                                    <label class="bg-white p-4 rounded-xl border border-slate-100 flex justify-between items-center">
                                                        <div class="flex items-center gap-3">
                                                            <span class="text-2xl" x-text="item.i"></span>
                                                            <span class="text-[11px] font-bold text-slate-700 uppercase" x-text="item.n"></span>
                                                        </div>
                                                        <input type="checkbox" :checked="isProductVisible(item.n)" @change="toggleProductVisibility(item.n)" class="w-6 h-6">
                                                    </label>
                                                </template>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>

                <template x-if="!showManager">
                    <div class="space-y-4">
                        <template x-for="(main, mIdx) in filteredMenu()" :key="mIdx">
                            <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
                                <button @click="openGroup === mIdx ? openGroup = null : openGroup = mIdx" 
                                        class="w-full p-6 flex justify-between items-center" :class="openGroup === mIdx ? 'active-btn' : ''">
                                    <div class="flex items-center gap-5 text-left">
                                        <span class="text-4xl" x-text="main.icon"></span>
                                        <span class="font-black text-slate-900 uppercase text-[13px]" x-text="main.title"></span>
                                    </div>
                                    <span class="text-slate-300 font-bold" x-text="openGroup === mIdx ? '−' : '＋'"></span>
                                </button>
                                <div x-show="openGroup === mIdx" x-cloak class="p-4 bg-slate-50 border-t border-slate-100 space-y-8">
                                    <template x-for="sub in main.subs">
                                        <div x-show="filteredVisibleItems(sub.items).length > 0">
                                            <h3 class="text-[10px] font-black text-emerald-800 mb-4 uppercase border-b-2 border-emerald-100 pb-1" x-text="sub.name"></h3>
                                            <div class="grid grid-cols-3 gap-3">
                                                <template x-for="item in filteredVisibleItems(sub.items)">
                                                    <button @click="askAmount(item.n)" class="bg-white p-4 rounded-3xl border border-slate-200 flex flex-col items-center active:scale-90 transition-all shadow-sm">
                                                        <span class="text-3xl" x-text="item.i"></span>
                                                        <span class="text-[9px] font-black text-slate-700 mt-2.5 uppercase text-center leading-tight" x-text="item.n"></span>
                                                    </button>
                                                </template>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>
            </div>
        </main>

        <footer class="bg-white border-t p-4 flex flex-col justify-between shadow-2xl z-50">
            <div class="flex gap-2 overflow-x-auto pb-3 no-scrollbar items-center min-h-[55px]">
                <template x-for="(item, index) in items" :key="index">
                    <button @click="removeItem(index)" class="flex-shrink-0 bg-slate-950 text-white text-[10px] font-black px-4 py-2.5 rounded-full flex items-center gap-2.5">
                        <span x-text="item"></span> <span class="text-red-400">✕</span>
                    </button>
                </template>
            </div>
            <button @click="shareList()" class="w-full bg-[#16a34a] text-white p-5 rounded-[2rem] font-black shadow-lg flex justify-between items-center px-10 active:scale-95 transition-all text-sm uppercase tracking-widest">
                <span>WhatsApp İle Gönder</span>
                <span class="bg-white/20 px-3 py-1 rounded-full text-[10px]" x-text="items.length"></span>
            </button>
        </footer>
    </div>

    <div x-show="showModal" x-cloak class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-emerald-950/90 backdrop-blur-sm">
        <div class="bg-white w-full max-w-xs rounded-[3rem] p-10 shadow-2xl">
            <h3 class="text-xl font-black text-center mb-8 italic" x-text="selectedItem"></h3>
            <div class="grid grid-cols-3 gap-4">
                <template x-for="n in [1,2,3,4,5,10]">
                    <button @click="confirmAdd(n + ' Adet')" class="bg-slate-100 p-5 rounded-3xl font-black active:bg-green-600 active:text-white" x-text="n"></button>
                </template>
                <button @click="confirmAdd('0.5 KG')" class="bg-blue-50 p-5 rounded-3xl font-bold text-blue-600 text-xs">0.5 KG</button>
                <button @click="confirmAdd('1 KG')" class="bg-blue-50 p-5 rounded-3xl font-bold text-blue-600 text-xs">1 KG</button>
                <button @click="confirmAdd('Paket')" class="bg-orange-50 p-5 rounded-3xl font-bold text-orange-600 text-[10px]">PAKET</button>
            </div>
            <button @click="showModal = false" class="w-full text-slate-400 mt-10 font-bold text-[10px] uppercase text-center tracking-widest">Vazgeç</button>
        </div>
    </div>

    <script>
        function app() {
            return {
                menu: [], visibleProducts: [], searchTerm: '', openGroup: null, showModal: false, selectedItem: '', showManager: false,
                items: JSON.parse(localStorage.getItem('eksikler') || '[]'),
                async loadData() {
                    const res = await fetch('data.json');
                    this.menu = await res.json();
                    this.initVisibleProducts();
                },
                initVisibleProducts() {
                    const stored = localStorage.getItem('fresh_market_visible');
                    if (stored) {
                        this.visibleProducts = JSON.parse(stored);
                    } else {
                        let allItems = [];
                        this.menu.forEach(cat => cat.subs.forEach(sub => sub.items.forEach(item => allItems.push(item.n))));
                        this.visibleProducts = allItems;
                        this.saveVisibleProducts();
                    }
                },
                isProductVisible(name) { return this.visibleProducts.includes(name); },
                toggleProductVisibility(name) {
                    if (this.visibleProducts.includes(name)) {
                        this.visibleProducts = this.visibleProducts.filter(p => p !== name);
                    } else {
                        this.visibleProducts.push(name);
                    }
                    this.saveVisibleProducts();
                },
                saveVisibleProducts() { localStorage.setItem('fresh_market_visible', JSON.stringify(this.visibleProducts)); },
                filteredMenu() {
                    return this.menu.map(cat => ({
                        ...cat,
                        subs: cat.subs.filter(sub => {
                            const visibleItems = sub.items.filter(item => this.visibleProducts.includes(item.n));
                            return visibleItems.length > 0 && (sub.name.toLowerCase().includes(this.searchTerm.toLowerCase()) || visibleItems.some(i => i.toLowerCase().includes(this.searchTerm.toLowerCase())));
                        })
                    })).filter(cat => cat.subs.length > 0);
                },
                filteredVisibleItems(subItems) {
                    return subItems.filter(item => this.visibleProducts.includes(item.n) && item.n.toLowerCase().includes(this.searchTerm.toLowerCase()));
                },
                askAmount(name) { this.selectedItem = name; this.showModal = true; },
                confirmAdd(amount) { this.items.unshift(this.selectedItem + " (" + amount + ")"); this.save(); this.showModal = false; },
                removeItem(index) { this.items.splice(index, 1); this.save(); },
                clearAll() { if(confirm('Sıfırla?')) { this.items = []; this.save(); } },
                save() { localStorage.setItem('eksikler', JSON.stringify(this.items)); },
                shareList() { let text = "*MARKET LİSTESİ*\n" + this.items.join("\n"); window.open("https://wa.me/?text=" + encodeURIComponent(text)); }
            }
        }
    </script>
</body>
</html>
